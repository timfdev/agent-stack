# v0 stack — two services. All other capability comes through mcp-gateway.
# See README.md for first-time setup (a0-discord plugin install, LinkedIn login).

services:
  agent-zero:
    image: ${AGENT_ZERO_IMAGE}
    container_name: agent-zero
    restart: unless-stopped
    networks:
      - agent-net
    ports:
      # Bound to AGENT_ZERO_BIND — set to the Mac mini's Meshnet IP so any
      # linked Meshnet device reaches the UI directly. Meshnet's per-peer
      # ACLs are the access gate; set a UI password in Agent Zero too.
      - "${AGENT_ZERO_BIND}:50001:80"
    environment:
      TZ: Europe/Amsterdam
    # Everything in .env is passed through to the container (chmod 600,
    # gitignored). This auto-includes any future A0_SET_* model pins so
    # we don't have to mirror each new variable into compose. Compose-
    # interpolation variables (AGENT_ZERO_BIND, image tags) stay above.
    env_file:
      - .env
    volumes:
      # Persistent agent state — restic backs this up nightly.
      - ./data/agent-zero/memory:/a0/memory
      - ./data/agent-zero/knowledge:/a0/knowledge
      - ./data/agent-zero/work_dir:/a0/work_dir
      - ./data/agent-zero/scheduler:/a0/tmp/scheduler
      # a0-discord plugin state (member registry, channel config).
      - ./data/agent-zero/plugins/discord:/a0/usr/plugins/discord/data
      # Skills mounted read-only — the agent only reads skill files.
      - ./agent-zero/skills:/a0/knowledge/custom/skills:ro
      # Plugin source mounted writable so docker can create the nested
      # ./data mountpoint at runtime (the plugin source has no data/
      # subdir, and a read-only parent blocks mountpoint creation). The
      # plugin audit confirmed it does not modify its own source tree.
      - ./agent-zero/plugins/discord:/a0/usr/plugins/discord

  mcp-gateway:
    image: ${MCP_GATEWAY_IMAGE}
    container_name: mcp-gateway
    restart: unless-stopped
    networks:
      - agent-net
    volumes:
      # Docker socket — the gateway lazy-spawns MCP server containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Custom catalog of MCP servers (LinkedIn for v0).
      - ./mcp-config:/mcp-config:ro
      # Shared cache root for MCP server containers (e.g. LinkedIn session).
      - ./data/linkedin-mcp:/data/linkedin-mcp
    # Catalog file path is passed at runtime; see README for the
    # `docker mcp catalog`/`docker mcp server enable` workflow that
    # registers ./mcp-config/custom.yaml into the gateway's profile.
    command: ["--catalog", "/mcp-config/custom.yaml"]

networks:
  agent-net:
    driver: bridge
