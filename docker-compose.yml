# v0 stack — two services. All other capability comes through mcp-gateway.
# See README.md for first-time setup (a0-discord plugin install, LinkedIn login).

services:
  agent-zero:
    image: ${AGENT_ZERO_IMAGE}
    container_name: agent-zero
    restart: unless-stopped
    networks:
      - agent-net
    ports:
      # Bound to AGENT_ZERO_BIND — set to the Mac mini's Meshnet IP so any
      # linked Meshnet device reaches the UI directly. Meshnet's per-peer
      # ACLs are the access gate; set a UI password in Agent Zero too.
      - "${AGENT_ZERO_BIND}:50001:80"
    environment:
      TZ: Europe/Amsterdam
    # Everything in .env is passed through to the container (chmod 600,
    # gitignored). This auto-includes any future A0_SET_* model pins so
    # we don't have to mirror each new variable into compose. Compose-
    # interpolation variables (AGENT_ZERO_BIND, image tags) stay above.
    env_file:
      - .env
    volumes:
      # Single volume per Agent Zero's docs (`-v a0_usr:/a0/usr`). All
      # user state (memory, knowledge, scheduler, plugins) lives here
      # post-migration. The a0-discord plugin is installed via
      # `docker cp` after the container is up, per the plugin's README —
      # not bind-mounted, because that fights the migration system.
      - ./data/agent-zero/usr:/a0/usr
    healthcheck:
      # discord-init waits for this to go green before running.
      test: ["CMD-SHELL", "curl -fs http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 30s

  discord-init:
    # One-shot: after agent-zero is healthy, register Discord channels
    # listed in .env with the chat bridge. Idempotent; safe to re-run.
    # Skips silently if the plugin isn't installed yet (first boot
    # before UI install).
    image: docker:cli
    depends_on:
      agent-zero:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    env_file:
      - .env
    entrypoint: ["/scripts/register-channels.sh"]
    restart: "no"

  linkedin-cache-init:
    # One-shot: chown the linkedin-mcp-cache named volume to UID 1000
    # (pwuser inside the linkedin image) so its first write doesn't
    # hit EACCES. Idempotent; runs on every `compose up` but the chown
    # is a no-op after the first time. Without this, the linkedin MCP
    # server crashes on startup with PermissionError on its trace dir.
    image: alpine:latest
    volumes:
      - linkedin-mcp-cache:/data
    command: ["chown", "-R", "1000:1000", "/data"]
    restart: "no"

  mcp-gateway:
    image: ${MCP_GATEWAY_IMAGE}
    container_name: mcp-gateway
    restart: unless-stopped
    depends_on:
      linkedin-cache-init:
        condition: service_completed_successfully
    networks:
      - agent-net
    volumes:
      # Docker socket — the gateway lazy-spawns MCP server containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Catalog of MCP servers, version-controlled in this repo.
      - ./mcp-config:/mcp-config:ro
      # Shared cache root for stateful MCP server containers (e.g.
      # browser-based scrapers' login sessions).
      - ./data/mcp-cache:/data/mcp-cache
    command:
      - --catalog
      - /mcp-config/custom.yaml
      # HTTP transport so the gateway runs as a long-lived service that
      # Agent Zero connects to.
      - --transport
      - streaming
      - --port
      - "8811"
      # Enable specific catalog servers here. In default (non-static)
      # mode the gateway docker-runs each server's image directly via
      # the mounted docker socket (clientpool.go:482 — NewStdioCmdClient
      # with "docker" as the command). With --static it would instead
      # expect sibling containers at mcp-<name>:4444 — that's NOT what
      # we want.
      - --servers
      - linkedin
      # Tool whitelist. The gateway has no "exclude destructive" flag
      # even though every tool advertises destructiveHint / readOnlyHint
      # in its MCP annotations, so we list the LinkedIn tools we want
      # explicitly. Excluded on purpose: connect_with_person and
      # send_message — the only LinkedIn-visible write actions.
      # close_session is included: it only kills the in-memory browser
      # (persisted profile in linkedin-mcp-cache survives), so it's a
      # useful resource-release hook, not a destructive action.
      - --tools
      - close_session,get_company_posts,get_company_profile,get_conversation,get_feed,get_inbox,get_job_details,get_person_profile,get_sidebar_profiles,search_conversations,search_jobs,search_people

networks:
  agent-net:
    driver: bridge

volumes:
  # Persistent Patchright session for the linkedin MCP server, referenced
  # from mcp-config/custom.yaml. Named volume avoids the
  # daemon-CWD-relative path issue with catalog bind-mount entries.
  # `name:` pin overrides compose's default project-prefixing —
  # mcp-config/custom.yaml references the *unprefixed* name, so both
  # the init chown and the gateway's docker-run target the same volume.
  linkedin-mcp-cache:
    name: linkedin-mcp-cache
