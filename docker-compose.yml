# v0 stack — two services. All other capability comes through mcp-gateway.
# See README.md for first-time setup (a0-discord plugin install, LinkedIn login).

services:
  agent-zero:
    image: ${AGENT_ZERO_IMAGE}
    container_name: agent-zero
    restart: unless-stopped
    networks:
      - agent-net
    ports:
      # Bound to AGENT_ZERO_BIND — set to the Mac mini's Meshnet IP so any
      # linked Meshnet device reaches the UI directly. Meshnet's per-peer
      # ACLs are the access gate; set a UI password in Agent Zero too.
      - "${AGENT_ZERO_BIND}:50001:80"
    environment:
      TZ: Europe/Amsterdam
    # Everything in .env is passed through to the container (chmod 600,
    # gitignored). This auto-includes any future A0_SET_* model pins so
    # we don't have to mirror each new variable into compose. Compose-
    # interpolation variables (AGENT_ZERO_BIND, image tags) stay above.
    env_file:
      - .env
    volumes:
      # Single volume per Agent Zero's docs (`-v a0_usr:/a0/usr`). All
      # user state (memory, knowledge, scheduler, plugins) lives here
      # post-migration. The a0-discord plugin is installed via
      # `docker cp` after the container is up, per the plugin's README —
      # not bind-mounted, because that fights the migration system.
      - ./data/agent-zero/usr:/a0/usr

  mcp-gateway:
    image: ${MCP_GATEWAY_IMAGE}
    container_name: mcp-gateway
    restart: unless-stopped
    networks:
      - agent-net
    volumes:
      # Docker socket — the gateway lazy-spawns MCP server containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Catalog of MCP servers, version-controlled in this repo.
      - ./mcp-config:/mcp-config:ro
      # Shared cache root for stateful MCP server containers (e.g.
      # browser-based scrapers' login sessions).
      - ./data/mcp-cache:/data/mcp-cache
    command:
      - --catalog
      - /mcp-config/custom.yaml
      # HTTP transport so the gateway runs as a long-lived service that
      # Agent Zero connects to. Defaulting to stdio (one-shot) made the
      # service exit cleanly on every start.
      - --transport
      - streaming
      - --port
      - "8811"
      # No --servers flag: the gateway runs idle until a server is
      # enabled (add `--servers name1,name2` here, or use `docker mcp
      # server enable <name>` from the host). The catalog declares what
      # exists; --servers (or enable) decides what's active.

networks:
  agent-net:
    driver: bridge
